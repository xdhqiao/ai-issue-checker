services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/ai_issue_checker}
      MONGODB_DB: ${MONGODB_DB:-ai_issue_checker}
      CODE_REPOSITORY_ROOT: ${CODE_REPOSITORY_ROOT:-/ShareData}
      LLM_URL: ${LLM_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-deepseek-v4-flash}
      LLM_MOCK_ENABLED: ${LLM_MOCK_ENABLED:-true}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      LLM_FILE_TIMEOUT_SECONDS: ${LLM_FILE_TIMEOUT_SECONDS:-600}
      LLM_MAX_TOOL_ROUNDS: ${LLM_MAX_TOOL_ROUNDS:-30}
      FILE_CONCURRENCY: ${FILE_CONCURRENCY:-4}
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    volumes:
      - "${CODE_REPOSITORY_HOST_PATH:-./repositories}:/ShareData:ro"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
