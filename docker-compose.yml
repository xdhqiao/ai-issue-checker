services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/ai_issue_checker}
      MONGODB_DB: ${MONGODB_DB:-ai_issue_checker}
      CODE_REPOSITORY_ROOT: ${CODE_REPOSITORY_ROOT:-/ShareData}
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    volumes:
      - "${CODE_REPOSITORY_HOST_PATH:-./repositories}:/ShareData:ro"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
