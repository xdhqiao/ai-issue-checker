<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polyspace Issue 确认任务管理</title>
  <link rel="stylesheet" href="/static/admin_tasks.css?v=20260721-style2">
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <div>
        <p class="eyebrow">AI ISSUE CHECKER ADMIN</p>
        <h1>Polyspace Issue 确认任务管理</h1>
      </div>
      <div class="topbar-actions">
        <a class="text-button" href="/admin/authors.html">人员统计</a>
        <button id="refresh" class="text-button" type="button">刷新</button>
        <span id="total" class="result-summary">正在加载...</span>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="filter-band" aria-labelledby="filter-title">
      <div class="section-heading"><h2 id="filter-title">筛选任务</h2></div>
      <form id="filter-form">
        <label><span>项目</span><input id="project" type="search" placeholder="项目 ID" autocomplete="off"></label>
        <label><span>当前版本</span><input id="version" type="search" placeholder="review_version" autocomplete="off"></label>
        <label><span>开始日期</span><input id="dateFrom" type="datetime-local"></label>
        <label><span>结束日期</span><input id="dateTo" type="datetime-local"></label>
        <label><span>任务种类</span><select id="taskType"><option value="">全部种类</option><option value="1">Polyspace 确认</option></select></label>
        <label><span>任务状态</span><select id="state"><option value="">全部状态</option><option value="0">待执行</option><option value="1">执行中</option><option value="2">已完成</option><option value="3">失败</option></select></label>
        <div class="filter-actions">
          <button id="search" class="button-primary" type="submit">搜索</button>
          <button id="reset" class="button-secondary" type="button">重置</button>
        </div>
      </form>
    </section>

    <section class="task-band" aria-labelledby="task-list-title">
      <div class="section-heading list-heading">
        <div><h2 id="task-list-title">版本列表</h2><p class="muted">默认每页显示 20 条任务</p></div>
        <span class="muted">点击当前版本查看 Issue 确认报告</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th><button class="sort-button" data-sort="project_id" type="button">项目 ID<span class="sort-indicator"></span></button></th>
            <th><button class="sort-button" data-sort="review_version" type="button">当前版本<span class="sort-indicator"></span></button></th>
            <th><button class="sort-button" data-sort="task_type" type="button">任务种类<span class="sort-indicator"></span></button></th>
            <th><button class="sort-button" data-sort="state" type="button">任务状态<span class="sort-indicator"></span></button></th>
            <th><button class="sort-button numeric" data-sort="red_issue_num" type="button">红色问题数<span class="sort-indicator"></span></button></th>
            <th><button class="sort-button numeric" data-sort="issue_num" type="button">问题总数<span class="sort-indicator"></span></button></th>
            <th><button class="sort-button" data-sort="create_time" type="button">创建时间<span class="sort-indicator"></span></button></th>
          </tr></thead>
          <tbody id="rows"><tr class="loading-row"><td colspan="7">正在加载任务列表...</td></tr></tbody>
        </table>
      </div>
      <nav class="pagination" aria-label="任务列表分页">
        <button id="prev" type="button">上一页</button><span id="pageInfo" class="page-summary">1 / 1</span><button id="next" type="button">下一页</button>
      </nav>
    </section>
  </main>
  <script src="/static/admin_tasks.js?v=20260721-style2" defer></script>
</body>
</html>
